# Mies Light Theme for K9s
# Based on https://github.com/jaredgorski/Mies.vim
# Aligned with Ghostty terminal Mies palette
k9s:
  # General theme base colors
  body:
    fgColor: '#080808'  # chicagoBlack1 - main text
    bgColor: '#ffffff'  # chicagoWhite2 - main background
    logoColor: '#5f8787'  # chicagoBlue - accent logo

  # Prompt and input
  prompt:
    fgColor: '#080808'  # chicagoBlack1 - text
    bgColor: '#b0b0b0'  # chicagoGray5 - background (matches ghostty selection-background)
    suggestColor: '#949494'  # chicagoGray4 - suggestions

  # Information views
  info:
    fgColor: '#767676'  # chicagoGray3 - standard info
    sectionColor: '#080808'  # chicagoBlack1 - section headers

  # Menu and views
  frame:
    # Title
    title:
      fgColor: '#080808'  # chicagoBlack1 - title text
      bgColor: '#ffffff'  # chicagoWhite2 - title background
      highlightColor: '#5f8787'  # chicagoBlue - highlighted title
      counterColor: '#949494'  # chicagoGray4 - counters
      filterColor: '#5f8787'  # chicagoBlue - filter indicator

    # Menu
    menu:
      fgColor: '#767676'  # chicagoGray3 - menu text
      keyColor: '#080808'  # chicagoBlack1 - keyboard shortcuts
      numKeyColor: '#949494'  # chicagoGray4 - numbered shortcuts

    # Crumbs
    crumbs:
      fgColor: '#080808'  # chicagoBlack1 - text
      bgColor: '#b0b0b0'  # chicagoGray5 - background
      activeColor: '#5f8787'  # chicagoBlue - active crumb

    # Status
    status:
      newColor: '#008700'  # chicagoGreen1 - new items
      modifyColor: '#8e700b'  # chicagoGold1 - modified items
      addColor: '#00af5f'  # chicagoGreen2 - added items
      errorColor: '#d70000'  # chicagoRed - errors
      highlightColor: '#b0b0b0'  # chicagoGray5 - highlights
      killColor: '#d70000'  # chicagoRed - kill indicators
      completedColor: '#767676'  # chicagoGray3 - completed items

    # Border
    border:
      fgColor: '#c6c6c6'  # chicagoGray6 - border color
      focusColor: '#5f8787'  # chicagoBlue - focused border

  # Views
  views:
    # Charts
    charts:
      bgColor: '#ffffff'  # chicagoWhite2 - chart background
      defaultDialColors:
        - '#008700'  # chicagoGreen1 - positive/ok
        - '#d70000'  # chicagoRed - critical/danger
      defaultChartColors:
        - '#008700'  # chicagoGreen1 - series 1
        - '#5f8787'  # chicagoBlue - series 2
        - '#d70000'  # chicagoRed - series 3

    # Table
    table:
      fgColor: '#080808'  # chicagoBlack1 - text
      bgColor: '#ffffff'  # chicagoWhite2 - background
      cursorColor: '#c6c6c6'  # chicagoGray6 - cursor line
      markColor: '#8e700b'  # chicagoGold1 - marked line
      header:
        fgColor: '#080808'  # chicagoBlack1 - header text
        bgColor: '#ffffff'  # chicagoWhite2 - header background
        sorterColor: '#5f8787'  # chicagoBlue - sort indicator

    # YAML
    yaml:
      keyColor: '#080808'  # chicagoBlack1 - keys
      colonColor: '#949494'  # chicagoGray4 - colons
      valueColor: '#5f8787'  # chicagoBlue - values

    # Logs
    logs:
      fgColor: '#080808'  # chicagoBlack1 - standard logs
      bgColor: '#ffffff'  # chicagoWhite2 - background
      indicator:
        fgColor: '#767676'  # chicagoGray3 - indicator
        bgColor: '#ffffff'  # chicagoWhite2 - indicator background
