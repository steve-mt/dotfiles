# Mies Light Theme for K9s
# Palette from https://github.com/jaredgorski/Mies.vim
k9s:
  body:
    fgColor: '#080808'
    bgColor: '#ffffff'
    logoColor: '#5f8787'

  prompt:
    fgColor: '#080808'
    bgColor: '#ffffff'
    suggestColor: '#949494'

  info:
    fgColor: '#767676'
    sectionColor: '#080808'

  frame:
    title:
      fgColor: '#080808'
      bgColor: '#ffffff'
      highlightColor: '#5f8787'
      counterColor: '#949494'
      filterColor: '#5f8787'

    menu:
      fgColor: '#767676'
      keyColor: '#080808'
      numKeyColor: '#949494'

    crumbs:
      fgColor: '#080808'
      bgColor: '#ffffff'
      activeColor: '#5f8787'

    status:
      newColor: '#008700'
      modifyColor: '#8e700b'
      addColor: '#008700'
      errorColor: '#d70000'
      highlightColor: '#b0b0b0'
      killColor: '#d70000'
      completedColor: '#767676'

    border:
      fgColor: '#c6c6c6'
      focusColor: '#5f8787'

  views:
    charts:
      bgColor: '#ffffff'
      defaultDialColors:
        - '#008700'
        - '#d70000'
      defaultChartColors:
        - '#008700'
        - '#5f8787'
        - '#d70000'

    table:
      fgColor: '#080808'
      bgColor: '#ffffff'
      cursorColor: '#e5e5e5'
      markColor: '#8e700b'
      header:
        fgColor: '#080808'
        bgColor: '#ffffff'
        sorterColor: '#5f8787'

    yaml:
      keyColor: '#080808'
      colonColor: '#949494'
      valueColor: '#5f8787'

    logs:
      fgColor: '#080808'
      bgColor: '#ffffff'
      indicator:
        fgColor: '#767676'
        bgColor: '#ffffff'
